name: Build & Package

permissions:
  contents: read

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master", "features/*" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore --no-cache
    - name: Build
      run: dotnet build --no-restore
    - name: Test
      run: dotnet test --no-build --verbosity normal

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      CSPROJ_NAME: Seq.Input.MSSql.csproj
    steps:
    - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: 10.0.x
    - name: Restore dependencies
      run: dotnet restore ${CSPROJ_NAME} --no-cache
      working-directory: ./src/Seq.Input.MSSql
    - name: Publish
      run: dotnet publish ${CSPROJ_NAME} -c Release -o ./obj/publish --no-restore
      working-directory: ./src/Seq.Input.MSSql
    - name: Pack
      run: dotnet pack ${CSPROJ_NAME} -c Release -o ../../artifacts --no-build --no-restore
      working-directory: ./src/Seq.Input.MSSql
    - name: Upload nuget
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg
        if-no-files-found: warn
        compression-level: 9
        retention-days: 1
